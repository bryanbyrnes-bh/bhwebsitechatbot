<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breven Homes — Let's Build Together</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F5F0E8;
    --dark: #1A1A18;
    --charcoal: #2C2C2A;
    --gold: #B8955A;
    --gold-light: #D4AF78;
    --stone: #8A8478;
    --stone-light: #C4BEB4;
    --white: #FDFCFA;
  }

  html, body {
    height: 100%;
    font-family: 'Montserrat', sans-serif;
    background: var(--dark);
    color: var(--cream);
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(184,149,90,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(184,149,90,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 680px;
    margin: 0 auto;
  }

  .chat-header {
    padding: 24px 32px 20px;
    border-bottom: 1px solid rgba(184,149,90,0.2);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  .header-logo {
    width: 40px;
    height: 40px;
    border: 1px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--gold);
    font-weight: 600;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--cream);
    letter-spacing: 0.05em;
  }

  .header-text p {
    font-size: 10px;
    font-weight: 300;
    color: var(--stone);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .header-status {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--stone);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4CAF50;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 32px 32px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: rgba(184,149,90,0.3); border-radius: 2px; }

  .message {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.4s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border: 1px solid rgba(184,149,90,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--gold);
    flex-shrink: 0;
    letter-spacing: 0.05em;
    font-family: 'Cormorant Garamond', serif;
  }

  .msg-avatar.user-avatar {
    background: rgba(184,149,90,0.1);
    color: var(--gold-light);
    border-color: rgba(184,149,90,0.4);
  }

  .msg-content {
    max-width: 75%;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .message.user .msg-content { align-items: flex-end; }

  .msg-bubble {
    padding: 14px 18px;
    font-size: 13.5px;
    line-height: 1.7;
    font-weight: 300;
    letter-spacing: 0.02em;
  }

  .message.assistant .msg-bubble {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(184,149,90,0.15);
    color: var(--cream);
    border-radius: 0 12px 12px 12px;
  }

  .message.user .msg-bubble {
    background: rgba(184,149,90,0.12);
    border: 1px solid rgba(184,149,90,0.3);
    color: var(--cream);
    border-radius: 12px 0 12px 12px;
  }

  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }

  .quick-reply-btn {
    padding: 8px 16px;
    border: 1px solid rgba(184,149,90,0.4);
    background: transparent;
    color: var(--gold-light);
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s ease;
    border-radius: 2px;
  }

  .quick-reply-btn:hover {
    background: rgba(184,149,90,0.15);
    border-color: var(--gold);
    color: var(--gold);
  }

  .image-result {
    width: 100%;
    max-width: 380px;
    border: 1px solid rgba(184,149,90,0.3);
    overflow: hidden;
    margin-top: 8px;
  }

  .image-result img { width: 100%; display: block; }

  .image-caption {
    padding: 8px 12px;
    font-size: 10px;
    color: var(--stone);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-top: 1px solid rgba(184,149,90,0.2);
  }

  .estimate-card {
    border: 1px solid rgba(184,149,90,0.3);
    padding: 20px;
    margin-top: 8px;
    max-width: 340px;
    background: rgba(184,149,90,0.05);
  }

  .estimate-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--stone);
    margin-bottom: 12px;
  }

  .estimate-range {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    color: var(--gold-light);
    line-height: 1.2;
  }

  .estimate-details {
    margin-top: 12px;
    font-size: 11px;
    color: var(--stone-light);
    line-height: 1.8;
    font-weight: 300;
  }

  .typing-indicator {
    display: flex;
    gap: 12px;
    animation: fadeUp 0.3s ease forwards;
  }

  .typing-dots {
    padding: 14px 18px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(184,149,90,0.15);
    border-radius: 0 12px 12px 12px;
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .typing-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.4;
    animation: typingBounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .input-area {
    padding: 20px 32px 28px;
    border-top: 1px solid rgba(184,149,90,0.15);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-wrapper {
    flex: 1;
    border: 1px solid rgba(184,149,90,0.3);
    background: rgba(255,255,255,0.03);
    transition: border-color 0.2s ease;
  }

  .input-wrapper:focus-within { border-color: rgba(184,149,90,0.7); }

  #userInput {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--cream);
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.03em;
    padding: 14px 16px;
    resize: none;
    min-height: 48px;
    max-height: 120px;
  }

  #userInput::placeholder {
    color: rgba(138,132,120,0.5);
    font-style: italic;
  }

  #sendBtn {
    width: 48px;
    height: 48px;
    background: var(--gold);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s ease;
    flex-shrink: 0;
    color: var(--dark);
  }

  #sendBtn:hover { background: var(--gold-light); }
  #sendBtn:disabled { background: rgba(184,149,90,0.3); cursor: not-allowed; }

  #sendBtn svg { width: 18px; height: 18px; }

  .input-hint {
    font-size: 10px;
    color: rgba(138,132,120,0.4);
    margin-top: 8px;
    letter-spacing: 0.08em;
    text-align: center;
  }

  .generating-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    margin-top: 8px;
  }

  .gen-spinner {
    width: 12px;
    height: 12px;
    border: 1px solid rgba(184,149,90,0.3);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .chat-header, .messages, .input-area { padding-left: 20px; padding-right: 20px; }
  }
</style>
</head>
<body>

<div id="app">
  <div class="chat-header">
    <div class="header-logo">BH</div>
    <div class="header-text">
      <h1>Breven Homes</h1>
      <p>Custom Home Concierge</p>
    </div>
    <div class="header-status">
      <div class="status-dot"></div>
      Online
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="input-row">
      <div class="input-wrapper">
        <textarea id="userInput" placeholder="Type your message..." rows="1"></textarea>
      </div>
      <button id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
  </div>
</div>

<script>
// ─── Configuration ────────────────────────────────────────────────────────────
const CONFIG = {
  pricePerSqft: { low: 300, high: 400 },
  finishMultipliers: { standard: 0.85, premium: 1.0, luxury: 1.25 }
};

let conversationHistory = [];
let isTyping = false;

const SYSTEM_PROMPT = `You are the custom home concierge for Breven Homes, a luxury custom home builder in the Texas Hill Country. You are warm, knowledgeable, and refined — never pushy.

Your locations: Horseshoe Bay/Marble Falls, Dripping Springs, Liberty Hill, Spicewood, and Blanco, TX.

Your goals:
1. First determine if the person is a VENDOR/CONTRACTOR or a POTENTIAL HOMEOWNER CLIENT
2. For vendors: collect name, company, email, phone. Thank them warmly and let them know the team will be in touch.
3. For homeowner leads: have a warm conversation to understand their vision. Collect:
   - Name
   - Email
   - Phone
   - Desired location (from the list above)
   - Approximate square footage
   - Number of bedrooms and bathrooms
   - Finish level (standard / premium / luxury)
   - Their home vision and style description (for AI rendering)
   - Timeline
   - Budget awareness

SPECIAL COMMANDS — output these exact JSON blocks alongside your normal response text when appropriate:

For cost estimate (once you have sqft and finish level):
[ESTIMATE: {"sqft": 2500, "finish": "premium", "bedrooms": 4, "bathrooms": 3}]

For AI image rendering (once they describe their home vision):
[RENDER: {"prompt": "detailed architectural description, luxury custom home, Texas Hill Country style"}]

For saving to HubSpot (once you have name + email):
[SAVE_CONTACT: {"firstname": "John", "lastname": "Doe", "email": "john@example.com", "phone": "555-1234", "contact_type": "lead", "company": "", "location": "Liberty Hill", "sqft": "2500", "finish_level": "premium", "timeline": "12 months", "notes": "Wants modern farmhouse style"}]

Keep responses concise and conversational. Warm, refined tone — never robotic. Ask one or two questions at a time.

Start by warmly greeting the visitor and asking what brings them to Breven Homes today.`;

// ─── Chat Core ─────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', startChat);

async function startChat() {
  addAssistantMessage(
    "Welcome to Breven Homes. I'm here to help make your dream home a reality in the Texas Hill Country. What brings you here today — are you exploring building a custom home, or are you a vendor or contractor looking to connect with our team?",
    ['I want to build a home', "I'm a vendor / contractor", 'Just browsing']
  );
}

function addMessage(role, content, extraHTML = '') {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const avatarClass = role === 'user' ? 'user-avatar' : '';
  const avatarText = role === 'user' ? 'You' : 'BH';
  div.innerHTML = `
    <div class="msg-avatar ${avatarClass}">${avatarText}</div>
    <div class="msg-content">
      <div class="msg-bubble">${content}</div>
      ${extraHTML}
    </div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function addAssistantMessage(text, quickReplies = []) {
  let extraHTML = '';
  if (quickReplies.length > 0) {
    const btns = quickReplies.map(r =>
      `<button class="quick-reply-btn" onclick="handleQuickReply('${r}')">${r}</button>`
    ).join('');
    extraHTML = `<div class="quick-replies">${btns}</div>`;
  }
  addMessage('assistant', text, extraHTML);
}

function showTyping() {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'typing-indicator';
  div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="msg-avatar">BH</div>
    <div class="typing-dots">
      <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
    </div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function handleQuickReply(text) {
  document.querySelectorAll('.quick-reply-btn').forEach(btn => {
    btn.disabled = true;
    btn.style.opacity = '0.4';
  });
  addMessage('user', text);
  processUserMessage(text);
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isTyping) return;
  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  await processUserMessage(text);
}

async function processUserMessage(text) {
  isTyping = true;
  document.getElementById('sendBtn').disabled = true;
  conversationHistory.push({ role: 'user', content: text });
  showTyping();

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: conversationHistory, systemPrompt: SYSTEM_PROMPT })
    });

    const data = await response.json();
    hideTyping();

    if (data.error) {
      addAssistantMessage(`I'm having trouble connecting right now. Please try again in a moment.`);
      isTyping = false;
      document.getElementById('sendBtn').disabled = false;
      return;
    }

    const fullText = data.text;
    conversationHistory.push({ role: 'assistant', content: fullText });

    // Strip special commands from visible text
    const cleanText = fullText
      .replace(/\[ESTIMATE:.*?\]/gs, '')
      .replace(/\[RENDER:.*?\]/gs, '')
      .trim();

    addAssistantMessage(cleanText);

    // Handle ESTIMATE
    const estimateMatch = fullText.match(/\[ESTIMATE:\s*({.*?})\]/s);
    if (estimateMatch) {
      try { showEstimate(JSON.parse(estimateMatch[1])); } catch(e) {}
    }

    // Handle RENDER
    const renderMatch = fullText.match(/\[RENDER:\s*({.*?})\]/s);
    if (renderMatch) {
      try { generateImage(JSON.parse(renderMatch[1]).prompt); } catch(e) {}
    }

    // Contact save now handled by server-side extraction
    if (data.contactInfo) {
      saveToHubSpot(data.contactInfo);
    }

  } catch (err) {
    hideTyping();
    addAssistantMessage("I'm having trouble connecting right now. Please try again in a moment.");
    console.error(err);
  }

  isTyping = false;
  document.getElementById('sendBtn').disabled = false;
}

// ─── Estimate Card ─────────────────────────────────────────────────────────────
function showEstimate(params) {
  const { sqft = 2000, finish = 'premium', bedrooms = 3, bathrooms = 2 } = params;
  const multiplier = CONFIG.finishMultipliers[finish] || 1.0;
  const low = Math.round(sqft * CONFIG.pricePerSqft.low * multiplier);
  const high = Math.round(sqft * CONFIG.pricePerSqft.high * multiplier);
  const fmt = n => '$' + n.toLocaleString();

  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.innerHTML = `
    <div class="msg-avatar">BH</div>
    <div class="msg-content">
      <div class="estimate-card">
        <div class="estimate-label">Preliminary Investment Range</div>
        <div class="estimate-range">${fmt(low)} – ${fmt(high)}</div>
        <div class="estimate-details">
          ${sqft.toLocaleString()} sq ft · ${bedrooms} bed / ${bathrooms} bath<br>
          ${finish.charAt(0).toUpperCase() + finish.slice(1)} finish level<br>
          Based on $${CONFIG.pricePerSqft.low}–$${CONFIG.pricePerSqft.high}/sq ft<br>
          <em style="opacity:0.6;font-size:10px;">*Estimate only. Final pricing subject to site, design & specs.</em>
        </div>
      </div>
    </div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

// ─── AI Image Generation ───────────────────────────────────────────────────────
async function generateImage(prompt) {
  const messages = document.getElementById('messages');
  const loadingDiv = document.createElement('div');
  loadingDiv.className = 'message assistant';
  loadingDiv.innerHTML = `
    <div class="msg-avatar">BH</div>
    <div class="msg-content">
      <div class="msg-bubble">Generating your home rendering...</div>
      <div class="generating-badge"><div class="gen-spinner"></div>Creating your vision</div>
    </div>
  `;
  messages.appendChild(loadingDiv);
  messages.scrollTop = messages.scrollHeight;

  try {
    const res = await fetch('/api/image', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    const data = await res.json();
    loadingDiv.remove();

    if (data.error || !data.url) {
      addMessage('assistant', "The rendering couldn't be generated right now. Our design team will provide professional renderings during your consultation.");
      return;
    }

    const imgDiv = document.createElement('div');
    imgDiv.className = 'message assistant';
    imgDiv.innerHTML = `
      <div class="msg-avatar">BH</div>
      <div class="msg-content">
        <div class="msg-bubble">Here's an AI rendering based on your vision:</div>
        <div class="image-result">
          <img src="${data.url}" alt="AI home rendering" />
          <div class="image-caption">AI-generated concept · For visualization only</div>
        </div>
      </div>
    `;
    messages.appendChild(imgDiv);
    messages.scrollTop = messages.scrollHeight;

  } catch(err) {
    loadingDiv.remove();
    addMessage('assistant', "I wasn't able to generate the rendering right now, but our design team will create professional renderings as part of your consultation.");
    console.error(err);
  }
}

// ─── HubSpot ───────────────────────────────────────────────────────────────────
async function saveToHubSpot(contact) {
  try {
    await fetch('/api/hubspot', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(contact)
    });
    console.log('Contact saved:', contact.email);
  } catch(err) {
    console.error('HubSpot save error:', err);
  }
}

// ─── Input Handling ────────────────────────────────────────────────────────────
const input = document.getElementById('userInput');
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});
</script>
</body>
</html>
