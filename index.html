<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breven Homes — Get In Touch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Switzer:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --neutral-800: #0D0D0D;
    --neutral-700: #2D2D2D;
    --neutral-600: #595959;
    --neutral-500: #909090;
    --neutral-400: #CFCFCF;
    --neutral-300: #EAEAEA;
    --neutral-200: #FAFAFA;
    --neutral-100: #FFFFFF;
    --accent: #0D0D0D;
  }

  html, body {
    height: 100%;
    font-family: 'Switzer', sans-serif;
    background: var(--neutral-100);
    color: var(--neutral-800);
    overflow: hidden;
  }

  #app {
    height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 100%;
  }

  /* ── Header ── */
  .chat-header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--neutral-300);
    display: flex;
    align-items: center;
    gap: 14px;
    flex-shrink: 0;
    background: var(--neutral-800);
  }

  .header-logo {
    width: 36px;
    height: 36px;
    border: 1px solid rgba(255,255,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 500;
    color: var(--neutral-100);
    letter-spacing: 0.05em;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-size: 15px;
    font-weight: 500;
    color: var(--neutral-100);
    letter-spacing: 0.04em;
  }

  .header-text p {
    font-size: 10px;
    font-weight: 300;
    color: var(--neutral-400);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--neutral-400);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #05C168;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── Messages ── */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 28px 12px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: var(--neutral-200);
  }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--neutral-400); }

  .message {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.35s ease forwards;
    opacity: 0;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 600;
    flex-shrink: 0;
    letter-spacing: 0.05em;
    background: var(--neutral-800);
    color: var(--neutral-100);
  }

  .msg-avatar.user-avatar {
    background: var(--neutral-300);
    color: var(--neutral-700);
  }

  .msg-content {
    max-width: 78%;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .message.user .msg-content { align-items: flex-end; }

  .msg-bubble {
    padding: 12px 16px;
    font-size: 13.5px;
    line-height: 1.65;
    font-weight: 300;
    letter-spacing: 0.01em;
  }

  .message.assistant .msg-bubble {
    background: var(--neutral-100);
    border: 1px solid var(--neutral-300);
    color: var(--neutral-800);
    border-radius: 0 8px 8px 8px;
  }

  .message.user .msg-bubble {
    background: var(--neutral-800);
    color: var(--neutral-100);
    border-radius: 8px 0 8px 8px;
  }

  /* ── Quick replies ── */
  .quick-replies {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 2px;
  }

  .quick-reply-btn {
    padding: 7px 14px;
    border: 1px solid var(--neutral-800);
    background: transparent;
    color: var(--neutral-800);
    font-family: 'Switzer', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .quick-reply-btn:hover {
    background: var(--neutral-800);
    color: var(--neutral-100);
  }

  .quick-reply-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  /* ── Estimate card ── */
  .estimate-card {
    border: 1px solid var(--neutral-800);
    padding: 20px;
    margin-top: 4px;
    max-width: 320px;
    background: var(--neutral-100);
  }

  .estimate-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--neutral-500);
    margin-bottom: 10px;
    font-weight: 500;
  }

  .estimate-range {
    font-size: 26px;
    font-weight: 300;
    color: var(--neutral-800);
    line-height: 1.2;
    letter-spacing: -0.02em;
  }

  .estimate-details {
    margin-top: 10px;
    font-size: 11px;
    color: var(--neutral-600);
    line-height: 1.8;
    font-weight: 300;
    border-top: 1px solid var(--neutral-300);
    padding-top: 10px;
  }

  /* ── Image result ── */
  .image-result {
    width: 100%;
    max-width: 360px;
    border: 1px solid var(--neutral-300);
    overflow: hidden;
    margin-top: 4px;
  }

  .image-result img { width: 100%; display: block; }

  .image-caption {
    padding: 7px 12px;
    font-size: 9px;
    color: var(--neutral-500);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 500;
    border-top: 1px solid var(--neutral-300);
    background: var(--neutral-200);
  }

  /* ── Typing indicator ── */
  .typing-indicator {
    display: flex;
    gap: 10px;
    animation: fadeUp 0.3s ease forwards;
  }

  .typing-dots {
    padding: 12px 16px;
    background: var(--neutral-100);
    border: 1px solid var(--neutral-300);
    border-radius: 0 8px 8px 8px;
    display: flex;
    gap: 4px;
    align-items: center;
  }

  .typing-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--neutral-500);
    opacity: 0.4;
    animation: bounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* ── Generating badge ── */
  .generating-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--neutral-600);
    margin-top: 6px;
    font-weight: 500;
  }

  .gen-spinner {
    width: 11px;
    height: 11px;
    border: 1.5px solid var(--neutral-300);
    border-top-color: var(--neutral-800);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Input area ── */
  .input-area {
    padding: 16px 28px 20px;
    border-top: 1px solid var(--neutral-300);
    flex-shrink: 0;
    background: var(--neutral-100);
  }

  .input-row {
    display: flex;
    gap: 0;
    align-items: flex-end;
    border: 1px solid var(--neutral-800);
  }

  .input-wrapper { flex: 1; }

  #userInput {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    color: var(--neutral-800);
    font-family: 'Switzer', sans-serif;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.02em;
    padding: 13px 16px;
    resize: none;
    min-height: 46px;
    max-height: 110px;
  }

  #userInput::placeholder {
    color: var(--neutral-500);
  }

  #sendBtn {
    width: 46px;
    height: 46px;
    background: var(--neutral-800);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s ease;
    flex-shrink: 0;
    color: var(--neutral-100);
  }

  #sendBtn:hover { background: var(--neutral-700); }
  #sendBtn:disabled { background: var(--neutral-400); cursor: not-allowed; }
  #sendBtn svg { width: 16px; height: 16px; }

  .input-hint {
    font-size: 10px;
    color: var(--neutral-500);
    margin-top: 7px;
    letter-spacing: 0.08em;
    text-align: center;
    font-weight: 300;
  }

  @media (max-width: 480px) {
    .chat-header, .messages, .input-area { padding-left: 18px; padding-right: 18px; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="chat-header">
    <div class="header-logo">BH</div>
    <div class="header-text">
      <h1>Breven Homes</h1>
      <p>Custom Home Concierge</p>
    </div>
    <div class="header-right">
      <div class="status-dot"></div>
      Online
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="input-row">
      <div class="input-wrapper">
        <textarea id="userInput" placeholder="Type your message..." rows="1"></textarea>
      </div>
      <button id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
  </div>
</div>

<script>
const CONFIG = {
  pricePerSqft: { low: 300, high: 400 },
  finishMultipliers: { standard: 0.85, premium: 1.0, luxury: 1.25 }
};

let conversationHistory = [];
let isTyping = false;

window.addEventListener('DOMContentLoaded', startChat);

async function startChat() {
  addAssistantMessage(
    "Welcome to Breven Homes. I'm here to help make your dream home a reality in the Texas Hill Country. What brings you here today — are you exploring building a custom home, or are you a vendor or contractor looking to connect with our team?",
    ['I want to build a home', "I'm a vendor / contractor", 'Just browsing']
  );
}

function addMessage(role, content, extraHTML = '') {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const avatarClass = role === 'user' ? 'user-avatar' : '';
  const avatarText = role === 'user' ? 'You' : 'BH';
  div.innerHTML = `
    <div class="msg-avatar ${avatarClass}">${avatarText}</div>
    <div class="msg-content">
      <div class="msg-bubble">${content}</div>
      ${extraHTML}
    </div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

function addAssistantMessage(text, quickReplies = []) {
  let extraHTML = '';
  if (quickReplies.length > 0) {
    const btns = quickReplies.map(r =>
      `<button class="quick-reply-btn" onclick="handleQuickReply('${r}')">${r}</button>`
    ).join('');
    extraHTML = `<div class="quick-replies">${btns}</div>`;
  }
  addMessage('assistant', text, extraHTML);
}

function showTyping() {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'typing-indicator';
  div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="msg-avatar">BH</div>
    <div class="typing-dots">
      <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
    </div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function handleQuickReply(text) {
  document.querySelectorAll('.quick-reply-btn').forEach(btn => {
    btn.disabled = true;
    btn.style.opacity = '0.35';
  });
  addMessage('user', text);
  processUserMessage(text);
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isTyping) return;
  input.value = '';
  input.style.height = 'auto';
  addMessage('user', text);
  await processUserMessage(text);
}

async function processUserMessage(text) {
  isTyping = true;
  document.getElementById('sendBtn').disabled = true;
  conversationHistory.push({ role: 'user', content: text });
  showTyping();

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: conversationHistory })
    });

    const data = await response.json();
    hideTyping();

    if (data.error) {
      addAssistantMessage("I'm having trouble connecting right now. Please try again in a moment.");
      isTyping = false;
      document.getElementById('sendBtn').disabled = false;
      return;
    }

    const fullText = data.text;
    conversationHistory.push({ role: 'assistant', content: fullText });

    const cleanText = fullText
      .replace(/\[ESTIMATE:.*?\]/gs, '')
      .replace(/\[RENDER:.*?\]/gs, '')
      .trim();

    addAssistantMessage(cleanText);

    const estimateMatch = fullText.match(/\[ESTIMATE:\s*({.*?})\]/s);
    if (estimateMatch) {
      try { showEstimate(JSON.parse(estimateMatch[1])); } catch(e) {}
    }

    const renderMatch = fullText.match(/\[RENDER:\s*({.*?})\]/s);
    if (renderMatch) {
      try { generateImage(JSON.parse(renderMatch[1]).prompt); } catch(e) {}
    }

    if (data.contactInfo) {
      saveToHubSpot(data.contactInfo);
    }

  } catch (err) {
    hideTyping();
    addAssistantMessage("I'm having trouble connecting right now. Please try again in a moment.");
    console.error(err);
  }

  isTyping = false;
  document.getElementById('sendBtn').disabled = false;
}

function showEstimate(params) {
  const { sqft = 2000, finish = 'premium', bedrooms = 3, bathrooms = 2 } = params;
  const multiplier = CONFIG.finishMultipliers[finish] || 1.0;
  const low = Math.round(sqft * CONFIG.pricePerSqft.low * multiplier);
  const high = Math.round(sqft * CONFIG.pricePerSqft.high * multiplier);
  const fmt = n => '$' + n.toLocaleString();

  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.innerHTML = `
    <div class="msg-avatar">BH</div>
    <div class="msg-content">
      <div class="estimate-card">
        <div class="estimate-label">Preliminary Investment Range</div>
        <div class="estimate-range">${fmt(low)} – ${fmt(high)}</div>
        <div class="estimate-details">
          ${sqft.toLocaleString()} sq ft · ${bedrooms} bed / ${bathrooms} bath<br>
          ${finish.charAt(0).toUpperCase() + finish.slice(1)} finish level<br>
          Based on $${CONFIG.pricePerSqft.low}–$${CONFIG.pricePerSqft.high}/sq ft<br>
          <em style="color:var(--neutral-500);font-size:10px;">Estimate only. Final pricing subject to site, design & specs.</em>
        </div>
      </div>
    </div>
  `;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

async function generateImage(prompt) {
  const messages = document.getElementById('messages');
  const loadingDiv = document.createElement('div');
  loadingDiv.className = 'message assistant';
  loadingDiv.innerHTML = `
    <div class="msg-avatar">BH</div>
    <div class="msg-content">
      <div class="msg-bubble">Generating your home rendering...</div>
      <div class="generating-badge"><div class="gen-spinner"></div>Creating your vision</div>
    </div>
  `;
  messages.appendChild(loadingDiv);
  messages.scrollTop = messages.scrollHeight;

  try {
    const res = await fetch('/api/image', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    const data = await res.json();
    loadingDiv.remove();

    if (data.error || !data.url) {
      addMessage('assistant', "The rendering couldn't be generated right now. Our design team will provide professional renderings during your consultation.");
      return;
    }

    const imgDiv = document.createElement('div');
    imgDiv.className = 'message assistant';
    imgDiv.innerHTML = `
      <div class="msg-avatar">BH</div>
      <div class="msg-content">
        <div class="msg-bubble">Here's an AI rendering based on your vision:</div>
        <div class="image-result">
          <img src="${data.url}" alt="AI home rendering" />
          <div class="image-caption">AI-generated concept · For visualization only</div>
        </div>
      </div>
    `;
    messages.appendChild(imgDiv);
    messages.scrollTop = messages.scrollHeight;
  } catch(err) {
    loadingDiv.remove();
    addMessage('assistant', "Rendering unavailable right now. Our design team will follow up with professional concepts.");
    console.error(err);
  }
}

async function saveToHubSpot(contact) {
  try {
    await fetch('/api/hubspot', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(contact)
    });
    console.log('Contact saved:', contact.email);
  } catch(err) {
    console.error('HubSpot error:', err);
  }
}

const input = document.getElementById('userInput');
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 110) + 'px';
});
</script>
</body>
</html>
